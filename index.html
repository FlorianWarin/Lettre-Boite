<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LettreBoite</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fcb35f9d; /* beige */
            font-family: Arial, sans-serif;
        }
        
        button {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 100px;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        button:active {
            background-color: #004085;
        }

        .containers-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .container {
            width: 200px;
            height: 200px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .container:hover {
            background-color: #cfc9c9;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .container:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="containers-wrapper">
        <div class="container" id="music-container">Musique</div>
        <div class="container">Films</div>
        <div class="container">Séries</div>
        <div class="container">Jeux-vidéos</div>
    </div>
    <button id="action-button">Cliquez-moi</button>
    <script src="app.js"></script>
</body>
</html>
